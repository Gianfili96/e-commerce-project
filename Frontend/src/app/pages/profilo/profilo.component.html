<div class="container py-4" style="max-width: 600px;">
  <h3 class="fw-bold mb-4">Il mio profilo</h3>

  @if (!utente()) {
    <div class="text-center">
      <div class="spinner-border text-primary" role="status"></div>
    </div>
  } @else {
    <div class="card shadow-sm">
      <div class="card-body">
        <div class="d-flex align-items-center mb-4">
          <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center me-3"
              style="width: 60px; height: 60px; font-size: 1.5rem; text-transform: uppercase;">
            
            {{ utente().username.charAt(0) }}

          </div>
          <div>
            <h5 class="mb-0 fw-bold">{{ utente().name }} {{ utente().surname }}</h5>
            <span class="badge bg-secondary">{{ 'Ciao, ' + utente().username }}</span>
          </div>
        </div>

        <ul class="list-group list-group-flush">
          <li class="list-group-item d-flex justify-content-between">
            <span class="text-muted">Username</span>
            <span class="fw-semibold">{{ utente().username }}</span>
          </li>
          <li class="list-group-item d-flex justify-content-between">
            <span class="text-muted">Email</span>
            <span class="fw-semibold">{{ utente().email }}</span>
          </li>
          <li class="list-group-item d-flex justify-content-between">
            <span class="text-muted">Ruolo</span>
            <span class="fw-semibold">Utente</span>
          </li>
        </ul>
      </div>
    </div>
  }
</div>
